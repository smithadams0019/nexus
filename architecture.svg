  <line x1="820" y1="370" x2="820" y2="435" stroke="#00897B" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="820" y1="435" x2="883" y2="435" stroke="#00897B" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="883,429 895,435 883,441" fill="#00897B"/>
  <text x="838" y="400" fill="#00897B" font-size="9">deployed on</text>

