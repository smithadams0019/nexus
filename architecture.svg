  <rect x="670" y="525" width="95" height="45" rx="6" fill="#FCE4EC" stroke="#EC407A" stroke-width="1"/>
  <text x="717" y="544" text-anchor="middle" fill="#AD1457" font-size="11" font-weight="bold">Action</text>
  <text x="717" y="558" text-anchor="middle" fill="#999" font-size="9">Desktop ctrl</text>

  <rect x="565" y="578" width="200" height="40" rx="6" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1"/>
  <text x="665" y="597" text-anchor="middle" fill="#283593" font-size="11" font-weight="bold">Research Agent</text>
  <text x="665" y="611" text-anchor="middle" fill="#999" font-size="9">Google Search grounding</text>

  <!-- Tech labels -->
  <text x="660" y="640" text-anchor="middle" fill="#E65100" font-size="10">Python 3.11 · FastAPI · Uvicorn · google-genai</text>

