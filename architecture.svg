  <text x="1020" y="398" text-anchor="middle" fill="#004D40" font-size="16" font-weight="bold">Google Cloud</text>
  <line x1="900" y1="408" x2="1140" y2="408" stroke="#00897B" stroke-width="1" opacity="0.3"/>

  <rect x="900" y="420" width="110" height="32" rx="6" fill="#fff" stroke="#80CBC4" stroke-width="1"/>
  <text x="955" y="441" text-anchor="middle" fill="#333" font-size="12">Cloud Run</text>

  <rect x="1020" y="420" width="110" height="32" rx="6" fill="#fff" stroke="#80CBC4" stroke-width="1"/>
  <text x="1075" y="441" text-anchor="middle" fill="#333" font-size="12">Cloud Build</text>

  <rect x="900" y="460" width="110" height="32" rx="6" fill="#fff" stroke="#80CBC4" stroke-width="1"/>
  <text x="955" y="481" text-anchor="middle" fill="#333" font-size="12">Firestore</text>

  <rect x="1020" y="460" width="110" height="32" rx="6" fill="#fff" stroke="#80CBC4" stroke-width="1"/>
