  <line x1="900" y1="578" x2="1140" y2="578" stroke="#E53935" stroke-width="1" opacity="0.3"/>

  <text x="1020" y="600" text-anchor="middle" fill="#333" font-size="12">click · type · hotkey · scroll · open app/url</text>
