  <text x="600" y="35" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Nexus — System Architecture</text>
  <text x="600" y="55" text-anchor="middle" fill="#888" font-size="13">Real-Time Voice + Vision AI Copilot · Gemini Live Agent Challenge</text>

  <!-- ================= COLUMN 1: USER ================= -->

  <rect x="40" y="220" width="160" height="200" rx="12" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="2"/>
  <text x="120" y="248" text-anchor="middle" fill="#283593" font-size="16" font-weight="bold">User</text>
  <line x1="55" y1="258" x2="185" y2="258" stroke="#5C6BC0" stroke-width="1" opacity="0.3"/>

  <rect x="55" y="270" width="130" height="28" rx="6" fill="#fff" stroke="#9FA8DA" stroke-width="1"/>
  <text x="120" y="289" text-anchor="middle" fill="#333" font-size="12">Camera</text>

  <rect x="55" y="306" width="130" height="28" rx="6" fill="#fff" stroke="#9FA8DA" stroke-width="1"/>
  <text x="120" y="325" text-anchor="middle" fill="#333" font-size="12">Microphone</text>

  <rect x="55" y="342" width="130" height="28" rx="6" fill="#fff" stroke="#9FA8DA" stroke-width="1"/>
  <text x="120" y="361" text-anchor="middle" fill="#333" font-size="12">Screen Share</text>

  <rect x="55" y="378" width="130" height="28" rx="6" fill="#fff" stroke="#9FA8DA" stroke-width="1"/>
