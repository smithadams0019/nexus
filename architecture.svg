  <line x1="660" y1="650" x2="940" y2="650" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="940" y1="650" x2="940" y2="495" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="6,3"/>
