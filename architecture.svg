  <rect x="565" y="204" width="200" height="36" rx="6" fill="#FFF3E0" stroke="#FFA726" stroke-width="1"/>
  <text x="665" y="221" text-anchor="middle" fill="#E65100" font-size="12" font-weight="bold">Task 2</text>
  <text x="665" y="235" text-anchor="middle" fill="#F57C00" font-size="10">Agent Processor (every 10s)</text>

