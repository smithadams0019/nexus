  <!-- Arrow: Action Agent → Desktop -->
  <line x1="765" y1="548" x2="820" y2="548" stroke="#E53935" stroke-width="1.5"/>
  <line x1="820" y1="548" x2="820" y2="580" stroke="#E53935" stroke-width="1.5"/>
  <line x1="820" y1="580" x2="883" y2="580" stroke="#E53935" stroke-width="1.5"/>
  <polygon points="883,574 895,580 883,586" fill="#E53935"/>
